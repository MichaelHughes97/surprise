<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Little Surprise</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="hearts"></div>

  <div class="container">
    <h1>Oi meu Amorzao  ❤️</h1>
    <p class="intro">I made something special for you.</p>

    <button id="surpriseBtn">Click here 💌</button>

    <div id="surprise" class="hidden">
      <h2>Surprise!</h2>

      <p class="message">
        Every moment with you means so much to me. I’m so lucky to have you in my life.
      </p>

      <div class="gallery">
        <img src="photos/photo1.jpg" alt="Us photo 1">
        <img src="photos/photo4.jpg" alt="Us photo 2">
        <img src="photos/photo3.jpg" alt="Us photo 3">
        <img src="photos/photo2.jpg" alt="Us photo 4">
        <img src="photos/photo5.jpg" alt="Us photo 5">
        <img src="photos/photo6.jpg" alt="Us photo 6">
      </div>

      <button id="letterBtn">One more surprise... Bambolino says 🎁</button>

      <div id="loveLetter" class="hidden letter">
        <h2>My love letter to you 💌</h2>
        <p>
          Obrigado por todos os momentos, saiba que você é perfeita e amo estar ao seu lado ❤️
        </p>
      </div>
    </div>
  </div>

  <audio id="music" src="music/song.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
